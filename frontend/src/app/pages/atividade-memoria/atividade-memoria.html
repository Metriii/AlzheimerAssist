<div class="page-layout">

  <button
    class="btn-voltar"
    (click)="voltar()"
  >
    Voltar
  </button>

  <div class="container">

    <div class="header-card">

      <h1>🧠 Atividades Cognitivas</h1>

      <p>
        Escolha uma atividade para começar.
      </p>

    </div>

    <div class="activities-grid">

      <div
        class="activity-card"
        routerLink="/atividade-animal"
      >

        <h2>🐶 Nome do animal</h2>

        <p>
          Descubra qual animal aparece na imagem.
        </p>

      </div>

      <div
        class="activity-card"
        routerLink="/jogo-memoria"
      >

        <h2>🧠 Jogo da memória</h2>

        <p>
          Encontre os pares iguais.
        </p>

      </div>

      <div class="activity-card">

        <h2>👨‍👩‍👧 Familiares</h2>

        <p>
          Reconheça pessoas importantes.
        </p>

      </div>

      <div
        class="activity-card"
        routerLink="/quebra-cabeca"
      >

        <h2>🧩 Quebra-cabeça</h2>

        <p>
          Monte imagens simples.
        </p>

      </div>

      <div
        class="activity-card full-width"
        routerLink="/associacao"
      >

        <h2>🔗 Associação</h2>

        <p>
          Associe imagens e objetos.
        </p>

      </div>

    </div>

  </div>

</div>
