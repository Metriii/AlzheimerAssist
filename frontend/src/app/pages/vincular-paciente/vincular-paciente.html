<div class="container">

  <div class="card">

    <h1>
      Vincular Paciente
    </h1>

    <p>
      Informe o e-mail do paciente
    </p>

    <input
      type="email"
      placeholder="Digite o e-mail"
      [(ngModel)]="emailPaciente" />

    <button
      (click)="vincular()">

      Vincular

    </button>

  </div>

</div>
