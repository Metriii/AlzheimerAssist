<div class="container">

  <div class="card">

    <h1>Reconhecimento Facial</h1>

    <p *ngIf="carregando">
      Carregando modelos...
    </p>

    <video
      #video
      autoplay
      muted
      playsinline>
    </video>

    <div class="buttons">
      <button (click)="cadastrarRosto()">
        Cadastrar rosto
      </button>

      <button class="login" (click)="loginFacial()">
        Login facial
      </button>
    </div>

  </div>

</div>
