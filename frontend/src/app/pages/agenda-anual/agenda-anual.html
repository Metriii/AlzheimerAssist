<div class="agenda-page">

  <button
    class="agenda-btn-voltar"
    (click)="voltar()"
  >
    ← Voltar
  </button>

  <div class="agenda-card">

    <div class="agenda-topo">

      <button
        class="agenda-btn-mes"
        (click)="mesAnterior()"
      >
        ←
      </button>

      <div class="agenda-titulo">

        <h1>
          {{ meses[mesAtual].nome }}
        </h1>

        <p>
          {{ ano }}
        </p>

      </div>

      <button
        class="agenda-btn-mes"
        (click)="proximoMes()"
      >
        →
      </button>

    </div>

    <div class="agenda-dias-semana">

      <span>Dom</span>
      <span>Seg</span>
      <span>Ter</span>
      <span>Qua</span>
      <span>Qui</span>
      <span>Sex</span>
      <span>Sáb</span>

    </div>

    <div class="agenda-grid">

      <div
        class="agenda-dia"
        [class.agenda-dia-vazio]="dia === null"
        *ngFor="let dia of gerarDias()"
        (click)="dia !== null && abrirCaixa(dia)"
      >

        <span *ngIf="dia !== null">
          {{ dia }}
        </span>

        <div
          class="evento-mini"
          *ngFor="let evento of buscarEventos(dia!)"
        >
          {{ evento.titulo }}
        </div>

      </div>

    </div>

  </div>

  <!-- MODAL -->

  <div
    class="modal-overlay"
    *ngIf="diaSelecionado !== null"
  >

    <div class="evento-card">

      <h2>
        Compromissos do dia {{ diaSelecionado }}
      </h2>

      <input
        type="text"
        placeholder="Título"
        [(ngModel)]="tituloEvento"
      />

      <textarea
        placeholder="Descrição"
        [(ngModel)]="descricaoEvento"
      ></textarea>

      <div class="evento-actions">

        <button
          class="btn-salvar"
          (click)="salvarEvento()"
        >
          Adicionar
        </button>

        <button
          class="btn-cancelar"
          (click)="fecharCaixa()"
        >
          Fechar
        </button>

      </div>

      <!-- LISTA -->

      <div
        class="eventos-lista"
        *ngIf="buscarEventos(diaSelecionado).length > 0"
      >

        <h3>
          Eventos cadastrados
        </h3>

        <div
          class="evento-item"
          *ngFor="
            let evento of buscarEventos(diaSelecionado);
            let i = index
          "
        >

          <div>

            <strong>
              {{ evento.titulo }}
            </strong>

            <p>
              {{ evento.descricao }}
            </p>

          </div>

          <button
            class="btn-apagar"
            (click)="apagarEvento(evento.chave, i)"
          >
            ❌
          </button>

        </div>

      </div>

    </div>

  </div>

</div>
