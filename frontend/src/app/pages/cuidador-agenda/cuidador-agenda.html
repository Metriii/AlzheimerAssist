<div class="layout">

  <button
    class="btn-voltar"
    (click)="voltar()"
  >
    Voltar
  </button>

  <div class="card-cuidador">

    <h2>
      Agenda do Paciente
    </h2>

    <div class="form-group">

      <input
        type="text"
        placeholder="Título da tarefa"
        [(ngModel)]="titulo"
      />

      <input
        type="time"
        [(ngModel)]="horario"
      />

      <button
        class="btn-add"
        (click)="adicionar()"
      >
        Adicionar
      </button>

    </div>

    <ul class="lista-tarefas">

      <li
        *ngFor="let t of tarefas; let i = index"
        class="tarefa-card"
      >

        <div class="tarefa-info">

          <input
            type="checkbox"
            [checked]="t.feito"
            (change)="toggle(i)"
          />

          <div
            class="tarefa-texto"
            [class.feito]="t.feito"
          >

            <span class="titulo">
              {{ t.titulo }}
            </span>

            <span class="horario">
              {{ t.horario }}
            </span>

          </div>

        </div>

        <button
          class="btn-del"
          (click)="excluir(i)"
        >
          X
        </button>

      </li>

    </ul>

  </div>

</div>
